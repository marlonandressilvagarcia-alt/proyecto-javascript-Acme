<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>

<section>
    <nav class="barra-navegacion">
        <h2 class="logo-nav">Sistema Acme</h2>
        <ul class="enlaces-nav">
            <li><a href="../usuarios/index.html">Usuarios</a></li>
            <li><a href="../inventario/index.html">Inventario</a></li>
            <li><a href="../produccion/index.html">Producción</a></li>
            <li><a href="../login/index.html">Salir</a></li>

        </ul>
    </nav>
</section>
<body>
    <div class="container">
        <h2>Gestión de Usuarios</h2>

        <form id="formulario-usuario">
            <div class="grupo-inputs">
                <div class="input-contenedor">
                    <label for="id-usuario">Identificación</label>
                    <input type="text" id="id-usuario" required>
                </div>
                <div class="input-contenedor">
                    <label for="nombre-usuario">Nombre Completo</label>
                    <input type="text" id="nombre-usuario" required>
                </div>
                <div class="input-contenedor">
                    <label for="cargo-usuario">Cargo</label>
                    <input type="text" id="cargo-usuario" required>
                </div>
                <div class="input-contenedor">
                    <label for="password-usuario">Contraseña</label>
                    <input type="password" id="password-usuario" required>
                </div>
            </div>
            <button type="submit" class="btn-primario">Guardar Usuario</button>
        </form>

        

        <h2>Lista de Usuarios</h2>
        <table id="tabla-usuarios">
            <thead>
                <tr>
                    <th>Identificación</th>
                    <th>Nombre</th>
                    <th>Cargo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>

    <script src="usuarios.js"></script>
</body>

</html>


</html>
